host: "0.0.0.0"
port: 80

com_link_rt_port: "COM4"

transport:
  com_link_rt:
    enabled: true
  virtual_link:
    enabled: true
    host: "127.0.0.1"
    port: 5470
    virtual_camera: true
  console_logger:
    enabled: true
    log_level: "DEBUG"

open_browser_on_start: false

users_json_path: "database/users.json"
questions_log_path: "database/questions.json"
questions_log_max_entries: 5000

environment_variables:
  - "flask_secret"
  - "MASTER_TOKEN"

user_data_settings:
  length:
    nickname: [3, 32]
    password: [8, 128]
  requirements:
    password:
      uppercase: true
      lowercase: true
      digit: true
      special_char: true
  regex:
    email: "[^@]+@[^@]+\\.[^@]+"
    special_chars: "[!@#$%^&*(),.?:{}|<>]"

emotions_config_path: "emotions.yml"

load_dotenv: true
debug: false